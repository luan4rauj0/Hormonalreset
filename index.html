<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0a0b0d">
<title>Hormonal Reset — Protocolo Pessoal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #0a0b0d;
  --bg-elevated: #111316;
  --card: #15171b;
  --card-hover: #1a1d22;
  --border: #24272d;
  --border-strong: #32363d;
  --text: #ededed;
  --text-muted: #8b8f98;
  --text-faint: #5a5e67;
  --accent: #4ade80;
  --accent-dim: #22c55e;
  --accent-bg: rgba(74, 222, 128, 0.08);
  --warn: #f59e0b;
  --warn-bg: rgba(245, 158, 11, 0.1);
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.08);
  --info: #60a5fa;
  --display: 'Fraunces', Georgia, serif;
  --body: 'Manrope', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overscroll-behavior: none;
}

body {
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 90px;
  position: relative;
}

/* ======= ATMOSPHERIC BG ======= */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 300px;
  background: radial-gradient(ellipse at top, rgba(74, 222, 128, 0.06), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ======= LAYOUT ======= */
.app { position: relative; z-index: 1; padding: 24px 20px 20px; }

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
}

.greeting {
  font-family: var(--display);
  font-size: 32px;
  font-weight: 400;
  font-optical-sizing: auto;
  letter-spacing: -0.03em;
  line-height: 1.1;
  font-style: italic;
}

.greeting .name { font-style: normal; font-weight: 500; color: var(--text); }

.date-info {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 6px;
}

.header-status {
  text-align: right;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.header-status .day-num {
  font-family: var(--display);
  font-style: italic;
  font-size: 28px;
  font-weight: 500;
  color: var(--accent);
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}

/* ======= CARD ======= */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border-strong); }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.card-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}

/* ======= STATS GRID ======= */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  position: relative;
}

.stat-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.stat-value {
  font-family: var(--display);
  font-size: 36px;
  font-weight: 400;
  font-optical-sizing: auto;
  letter-spacing: -0.03em;
  line-height: 1;
}

.stat-unit {
  font-size: 14px;
  color: var(--text-muted);
  font-family: var(--body);
  font-style: normal;
  margin-left: 4px;
}

.stat-trend {
  position: absolute;
  top: 16px;
  right: 16px;
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
}

.trend-down { background: var(--accent-bg); color: var(--accent); }
.trend-up { background: var(--danger-bg); color: var(--danger); }
.trend-neutral { background: var(--border); color: var(--text-muted); }

/* ======= PROGRESS BAR ======= */
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 12px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ======= CHECKLIST ======= */
.checklist-section {
  margin-bottom: 14px;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
}
.section-header:active { background: var(--card-hover); }
.section-header.expanded { border-radius: 14px 14px 0 0; border-bottom-color: transparent; }

.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 14px;
}

.section-icon {
  font-size: 18px;
}

.section-count {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
}

.section-items {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 14px 14px;
  padding: 4px 0;
  display: none;
}
.section-items.expanded { display: block; }

.check-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 20px;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid var(--border);
}
.check-item:last-child { border-bottom: none; }
.check-item:active { background: var(--card-hover); }

.checkbox {
  width: 22px;
  height: 22px;
  border: 1.5px solid var(--border-strong);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.2s;
}

.check-item.checked .checkbox {
  background: var(--accent);
  border-color: var(--accent);
}

.check-item.checked .checkbox::after {
  content: '';
  width: 6px;
  height: 10px;
  border: solid var(--bg);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-top: -3px;
  animation: checkPop 0.3s ease;
}

@keyframes checkPop {
  0% { opacity: 0; transform: rotate(45deg) scale(0); }
  50% { transform: rotate(45deg) scale(1.3); }
  100% { opacity: 1; transform: rotate(45deg) scale(1); }
}

.check-label {
  flex: 1;
  font-size: 14.5px;
  line-height: 1.4;
  transition: color 0.2s;
}
.check-item.checked .check-label { color: var(--text-muted); text-decoration: line-through; text-decoration-color: var(--text-faint); }

.check-note {
  font-size: 11.5px;
  color: var(--text-faint);
  margin-top: 3px;
  font-family: var(--mono);
}

/* ======= NAV ======= */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: rgba(10, 11, 13, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 4px;
  background: none;
  border: none;
  color: var(--text-faint);
  cursor: pointer;
  font-family: var(--body);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.03em;
  transition: color 0.2s;
  text-transform: uppercase;
}
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; }

/* ======= BUTTONS ======= */
.btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 14px 24px;
  border-radius: 12px;
  font-family: var(--body);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  letter-spacing: 0.02em;
}
.btn:active { transform: scale(0.98); }
.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border-strong);
}
.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px dashed var(--border-strong);
}
.btn-danger { background: var(--danger); color: white; }

/* ======= FORM ======= */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 15px;
  font-family: var(--body);
  transition: border-color 0.2s;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.form-input[type="number"] { font-family: var(--mono); }

.form-textarea { resize: vertical; min-height: 80px; font-family: var(--body); }

.slider-container {
  display: flex;
  align-items: center;
  gap: 12px;
}

.slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(74, 222, 128, 0.4);
}
.slider::-moz-range-thumb {
  width: 22px;
  height: 22px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: none;
}

.slider-value {
  font-family: var(--display);
  font-size: 24px;
  font-weight: 500;
  min-width: 36px;
  text-align: center;
  color: var(--accent);
}

/* ======= PAGE TITLE ======= */
.page-title {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.03em;
  margin-bottom: 6px;
  line-height: 1.1;
}
.page-title em { font-style: italic; color: var(--accent); }

.page-subtitle {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 24px;
}

/* ======= TABLE ======= */
.table {
  width: 100%;
  font-size: 13px;
}
.table th {
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
}
.table td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
}
.table .tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-family: var(--body);
  font-weight: 600;
}
.tag-ok { background: var(--accent-bg); color: var(--accent); }
.tag-warn { background: var(--warn-bg); color: var(--warn); }
.tag-bad { background: var(--danger-bg); color: var(--danger); }

/* ======= EMPTY STATE ======= */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}
.empty-state h3 {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 400;
  font-style: italic;
  color: var(--text);
  margin-bottom: 8px;
}
.empty-state p { font-size: 14px; margin-bottom: 20px; }

/* ======= TOAST ======= */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 13px;
  z-index: 1000;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  box-shadow: 0 8px 32px rgba(74, 222, 128, 0.3);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes toastOut {
  to { opacity: 0; transform: translateX(-50%) translateY(10px); }
}

/* ======= STREAK ======= */
.streak-display {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.streak-num {
  font-family: var(--display);
  font-size: 54px;
  font-weight: 500;
  letter-spacing: -0.04em;
  line-height: 1;
  background: linear-gradient(180deg, #fbbf24, #f59e0b);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ======= CHART ======= */
.chart-container {
  position: relative;
  height: 220px;
  margin-top: 8px;
}

/* ======= MODAL ======= */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s;
}
.modal {
  background: var(--bg-elevated);
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px;
  animation: slideUp 0.3s ease;
  border-top: 1px solid var(--border);
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: -12px auto 16px;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

/* ======= TABS ======= */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--card);
  padding: 4px;
  border-radius: 12px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active { background: var(--accent); color: var(--bg); font-weight: 600; }

/* ======= QUOTE ======= */
.quote {
  font-family: var(--display);
  font-size: 16px;
  font-style: italic;
  line-height: 1.5;
  color: var(--text-muted);
  padding: 0 8px;
  border-left: 2px solid var(--accent);
  padding-left: 14px;
  margin-top: 4px;
}

/* ======= UTILITIES ======= */
.hidden { display: none !important; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.text-muted { color: var(--text-muted); }
.text-small { font-size: 12px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }

/* ======= DAILY RESET ANIMATION ======= */
.complete-celebration {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
}

/* ======= EXAM GROUPS (empty state) ======= */
.exam-group {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.exam-group-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.exam-group-items {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
  line-height: 1.5;
}

/* ======= LAB CATEGORIES ======= */
.lab-category-section {
  margin-bottom: 24px;
  padding: 14px 14px 4px;
  background: var(--bg-elevated);
  border-radius: 12px;
  border: 1px solid var(--border);
}
.lab-category-title {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 500;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: -0.02em;
}
.lab-category-title span {
  font-size: 18px;
  font-style: normal;
}

/* ======= LAB RESULT CARD ======= */
.lab-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}
.lab-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.lab-markers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.lab-marker {
  background: var(--bg-elevated);
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
}
.lab-marker-name {
  color: var(--text-muted);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}
.lab-marker-value {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
}

/* ======= SCROLLBAR ======= */
::-webkit-scrollbar { width: 0; }

@media (max-width: 400px) {
  .app { padding: 20px 16px; }
  .greeting { font-size: 28px; }
  .stats-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app" id="app"></div>

<nav class="bottom-nav">
  <button class="nav-item active" data-view="dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Hoje
  </button>
  <button class="nav-item" data-view="checklist">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Rotina
  </button>
  <button class="nav-item" data-view="progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    Progresso
  </button>
  <button class="nav-item" data-view="labs">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.527a2 2 0 01-.211.896L4.72 20.55a1 1 0 00.9 1.45h12.76a1 1 0 00.9-1.45l-5.069-10.127A2 2 0 0114 9.527V2"/><path d="M8.5 2h7"/><path d="M7 16h10"/></svg>
    Exames
  </button>
  <button class="nav-item" data-view="settings">

<script>

    return { ...structuredClone(DEFAULT_STATE), ...parsed };
  } catch (e) {
    console.error('Load failed:', e);
    return structuredClone(DEFAULT_STATE);
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

}

// ============================================================================
// CHECKLIST TEMPLATE
// ============================================================================

const CHECKLIST_TEMPLATE = [

// ============================================================================
// HELPERS
// ============================================================================

function todayKey() {
  return new Date().toISOString().split('T')[0];
}

function dateToBR(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
}

function daysSinceStart() {
  const start = new Date(state.user.startDate + 'T00:00:00');
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.floor((now - start) / (1000 * 60 * 60 * 24)) + 1;
}

function getTodayCheckin() {
  const key = todayKey();
  if (!state.dailyCheckins[key]) {
    state.dailyCheckins[key] = {
      items: {},
      steps: null,
      workout: null,
      bedtime: null,
      sleepHours: null,
      notes: '',
    };
  }
  return state.dailyCheckins[key];
}

function getCompletionRate(checkin) {
  const total = CHECKLIST_TEMPLATE.reduce((sum, s) => sum + s.items.length, 0);
  const done = Object.values(checkin.items || {}).filter(v => v).length;
  return total > 0 ? Math.round((done / total) * 100) : 0;
}

function getStreak() {
  let streak = 0;
  const today = new Date();
  today.setHours(0,0,0,0);
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    const checkin = state.dailyCheckins[key];
    if (!checkin) { if (i === 0) continue; else break; }
    const rate = getCompletionRate(checkin);
    if (rate >= 70) streak++;
    else if (i > 0) break;
  }
  return streak;
}

function getLastWeight() {
  if (state.weeklyReviews.length === 0) return state.user.initialWeight;
  return state.weeklyReviews[state.weeklyReviews.length - 1].weight;
}

function getWeightTrend() {
  if (state.weeklyReviews.length < 2) return null;
  const last = state.weeklyReviews[state.weeklyReviews.length - 1].weight;
  const prev = state.weeklyReviews[state.weeklyReviews.length - 2].weight;
  return (last - prev).toFixed(1);
}

function greetingByHour() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia,';
  if (h < 18) return 'Boa tarde,';
  return 'Boa noite,';
}

const QUOTES = [

];

// ============================================================================
// TOAST
// ============================================================================

function toast(msg, isError = false) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  if (isError) { el.style.background = 'var(--danger)'; el.style.color = 'white'; }
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================================
// ROUTER
// ============================================================================

let currentView = 'dashboard';

function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });
  render();
  window.scrollTo(0, 0);
}

// ============================================================================

// ============================================================================

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  
  switch (currentView) {
    case 'dashboard': renderDashboard(app); break;
    case 'checklist': renderChecklist(app); break;
    case 'progress': renderProgress(app); break;
    case 'labs': renderLabs(app); break;
    case 'settings': renderSettings(app); break;

}

  `;
}

function shouldShowWeeklyPrompt() {
  const day = new Date().getDay();
  if (day !== 5) return false; // só sexta
  if (state.weeklyReviews.length === 0) return true;
  const last = state.weeklyReviews[state.weeklyReviews.length - 1];
  const lastDate = new Date(last.date);
  const daysSince = (new Date() - lastDate) / (1000*60*60*24);
  return daysSince >= 6;
}

  );

function renderSection(section, checkin) {
  const total = section.items.length;
  const done = section.items.filter(i => checkin.items[i.id]).length;

}

function updateSectionCount(sectionId) {
  const section = CHECKLIST_TEMPLATE.find(s => s.id === sectionId);

  const checkin = getTodayCheckin();
  const done = section.items.filter(i => checkin.items[i.id]).length;

  if (el) el.textContent = `${done}/${section.items.length}`;

  const checkin = getTodayCheckin();

function getMarkerTag(marker, value) {
  if (!marker.ranges || value === null || value === '' || isNaN(value)) return { class: '', text: '—' };
  const v = parseFloat(value);
  if (v >= marker.ranges.green[0] && v <= marker.ranges.green[1]) return { class: 'tag-ok', text: 'Ótimo' };
  if (v >= marker.ranges.yellow[0] && v <= marker.ranges.yellow[1]) return { class: 'tag-warn', text: 'Atenção' };
  return { class: 'tag-bad', text: 'Fora' };
}

function maybeCalculateHOMA() {
  const glu = parseFloat(document.getElementById('lab-glucose')?.value);
  const ins = parseFloat(document.getElementById('lab-insulin')?.value);
  const target = document.getElementById('lab-homair');
  if (glu && ins && target) {
    target.value = ((glu * ins) / 405).toFixed(2);
  }
}

function saveLab() {
  const markers = {};
  LAB_MARKERS.forEach(m => {
    const el = document.getElementById('lab-' + m.key);
    if (el && el.value !== '') markers[m.key] = parseFloat(el.value);
  });
  
  const lab = {
    id: 'lab_' + Date.now(),
    date: document.getElementById('lab-date').value,
    lab: document.getElementById('lab-name').value,
    markers,
    notes: document.getElementById('lab-notes').value,
  };
  
  if (Object.keys(markers).length === 0) {
    toast('Preencha pelo menos um marcador', true);
    return;
  }
  
  state.labResults.push(lab);
  state.labResults.sort((a,b) => a.date.localeCompare(b.date));
  saveState();
  closeModal();
  toast('Exame registrado 🧪');
  render();
}

function deleteLab(id) {
  if (!confirm('Excluir este exame?')) return;
  state.labResults = state.labResults.filter(l => l.id !== id);
  saveState();
  render();
  toast('Exame removido');
}

      <div class="form-group">
        <label class="form-label">Peso meta (kg)</label>
        <input type="number" step="0.1" class="form-input" id="set-target" value="${state.user.targetWeight}">
      </div>
      <div class="form-group">
        <label class="form-label">Data de início do protocolo</label>
        <input type="date" class="form-input" id="set-start" value="${state.user.startDate}">
      </div>
      <button class="btn" onclick="saveSettings()">Salvar</button>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom: 14px;">Backup dos dados</div>
      <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 14px;">Seus dados são salvos localmente no navegador. Exporte regularmente pra não perder.</p>
      <button class="btn btn-secondary" onclick="exportData()">Exportar JSON</button>
      <div class="mt-16">
        <label class="form-label">Importar backup</label>
        <input type="file" accept=".json" class="form-input" onchange="importData(event)">
      </div>
    </div>

    <div class="card" style="border-color: var(--danger);">
      <div class="card-title" style="margin-bottom: 14px; color: var(--danger);">Zona perigosa</div>
      <button class="btn btn-danger" onclick="resetAll()">Apagar todos os dados</button>
    </div>

    <div style="text-align: center; color: var(--text-faint); font-size: 11px; margin-top: 24px; font-family: var(--mono);">
      Hormonal Reset · v1.0<br>
      Dados salvos em localStorage<br>
      Funciona offline
    </div>
  `;
}

function saveSettings() {
  state.user.name = document.getElementById('set-name').value || 'Você';
  state.user.age = parseInt(document.getElementById('set-age').value);
  state.user.height = parseFloat(document.getElementById('set-height').value);
  state.user.initialWeight = parseFloat(document.getElementById('set-initial').value);
  state.user.targetWeight = parseFloat(document.getElementById('set-target').value);
  state.user.startDate = document.getElementById('set-start').value;
  saveState();
  toast('Configurações salvas');
}

function exportData() {
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hormonal-reset-backup-${todayKey()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup baixado 💾');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.user || !imported.dailyCheckins) {
        toast('Arquivo inválido', true);
        return;
      }
      if (!confirm('Isso vai substituir TODOS os seus dados atuais. Continuar?')) return;
      state = imported;
      saveState();
      render();
      toast('Dados importados 📥');
    } catch (err) {
      toast('Erro ao importar', true);
    }
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirm('ISSO VAI APAGAR TUDO. Tem certeza?')) return;
  if (!confirm('Última chance. Exportou backup antes?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = structuredClone(DEFAULT_STATE);
  render();
  toast('Tudo resetado');
}

// ---------- MODAL ----------

function showModal(html) {
  const existing = document.querySelector('.modal-backdrop');
  if (existing) existing.remove();
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `<div class="modal">${html}</div>`;
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) closeModal();
  });
  document.body.appendChild(backdrop);
}

function closeModal() {
  const m = document.querySelector('.modal-backdrop');
  if (m) m.remove();
}

// ============================================================================
// INIT
// ============================================================================

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.view));
});

// First-time welcome
if (!localStorage.getItem(STORAGE_KEY)) {
  saveState();
  setTimeout(() => {
    toast('Bem-vindo ao seu protocolo 🌱');
  }, 500);
}

render();

// PWA service worker (inline)
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.open('hr-v1').then(cache => 
          cache.match(e.request).then(r => r || fetch(e.request).then(fetched => {
            if (e.request.method === 'GET') cache.put(e.request, fetched.clone());
            return fetched;
          }).catch(() => caches.match('/')))
        )
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
</body>
</html>
